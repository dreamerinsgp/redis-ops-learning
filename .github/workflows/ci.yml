# redis-ops-learning: 编译 + 单元测试 + Redis 冒烟测试
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.21', '1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build -v ./...

      - name: Build binary
        run: go build -o redis-ops ./cmd

      - name: Unit tests
        run: go test -v -count=1 ./... || true

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            if redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              exit 0
            fi
            echo "Waiting for Redis... $i"
            sleep 2
          done
          exit 1

      - name: Build binary
        run: go build -o redis-ops ./cmd

      - name: Smoke test - 01-memory info
        env:
          REDIS_ADDR: 127.0.0.1:6379
        run: ./redis-ops run 01-memory info

      - name: Smoke test - 02-clients info
        env:
          REDIS_ADDR: 127.0.0.1:6379
        run: ./redis-ops run 02-clients info
